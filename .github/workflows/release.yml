name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.3.6)'
        required: true
        type: string
      release_notes:
        description: |
          Release notes — one item per line.
          Prefix keywords (case-insensitive) auto-badge:
            fix / fixed / fixes  →  Fix 🐛
            feature              →  Feature ✨
            improvement          →  Improvement 🛠️
            update / updated     →  Update 🔄
            change / changed     →  Change ♻️
        required: true
        type: string
      dry_run:
        description: 'Dry run — run tests only, skip tag/version bump/release (safe for branch testing)'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '17'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Run unit tests
        run: ./gradlew :amani-sdk-v1:test --continue

      - name: Upload unit-test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: amani-sdk-v1/build/reports/tests/

  # ── 2. Android instrumented tests ─────────────────────────────────────────────
  android-tests:
    name: Android Instrumented Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          avd-name: ci-avd
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: ./gradlew :amani-sdk-v1:connectedAndroidTest --continue

      - name: Upload instrumented-test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: amani-sdk-v1/build/reports/androidTests/

  # ── 3. Tag, version-bump & publish release ────────────────────────────────────
  release:
    name: Tag & Publish Release
    needs: android-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Dry-run notice ─────────────────────────────────────────────────────
      - name: Dry-run notice (skipping publish steps)
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "::notice title=Dry Run::Tests passed ✅  Tag, version bump and GitHub Release were skipped."

      # ── Bump version in amani-sdk-v1/build.gradle ──────────────────────────
      - name: Bump library version to ${{ github.event.inputs.version }}
        if: ${{ inputs.dry_run != true }}
        run: |
          sed -i \
            "s/version = '[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*[^']*'/version = '${{ github.event.inputs.version }}'/" \
            amani-sdk-v1/build.gradle

          # Verify the change was applied
          grep -q "version = '${{ github.event.inputs.version }}'" amani-sdk-v1/build.gradle || \
            { echo "::error::sed replacement failed — version '${{ github.event.inputs.version }}' not found in build.gradle"; exit 1; }

      # ── Commit & push the version bump ────────────────────────────────────
      - name: Commit version bump
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amani-sdk-v1/build.gradle
          git commit -m "chore(release): bump version to ${{ github.event.inputs.version }}"
          git push

      # ── Create & push the tag ──────────────────────────────────────────────
      - name: Create tag v${{ github.event.inputs.version }}
        if: ${{ inputs.dry_run != true }}
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      # ── Decorate each release-note line with the matching badge ───────────
      - name: Process release notes → badges
        if: ${{ inputs.dry_run != true }}
        id: notes
        shell: python3 {0}
        env:
          RAW_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          import os, re

          raw = os.environ.get("RAW_NOTES", "")

          # Order matters: more specific patterns first
          BADGES = [
              (r"\bfix(?:es|ed)?\b",    "![Fix](https://img.shields.io/badge/Fix-🐛-e74c3c)"),
              (r"\bfeature\b",          "![Feature](https://img.shields.io/badge/Feature-✨-8c730d)"),
              (r"\bimprovement\b",      "![Improvement](https://img.shields.io/badge/Improvement-🛠️-8e44ad)"),
              (r"\bupdate[sd]?\b",      "![Update](https://img.shields.io/badge/Update-🔄-2980b9)"),
              (r"\bchange[sd]?\b",      "![Change](https://img.shields.io/badge/Change-♻️-136634)"),
          ]

          lines = raw.strip().splitlines()
          decorated = []

          for line in lines:
              line = line.strip().lstrip("*-• ").strip()
              if not line:
                  continue
              badge = ""
              for pattern, b in BADGES:
                  if re.search(pattern, line, re.IGNORECASE):
                      badge = b + " "
                      break
              decorated.append(f"* {badge}{line}")

          body = "\n".join(decorated)

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write("body<<__DELIMITER__\n")
              fh.write(body + "\n")
              fh.write("__DELIMITER__\n")

      # ── Publish GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ## What's Changed?

            ${{ steps.notes.outputs.body }}

            ---
            **Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/v${{ github.event.inputs.version }}...HEAD
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}